local_costmap:
   global_frame: odom
   robot_base_frame: base_link
   update_frequency: 1.0   
   publish_frequency: 1.0
   
   rolling_window: true
   width: 3.0 
   height: 3.0 
   resolution: 0.02
   transform_tolerance: 0.5

   static_layer:
      enabled: false

   #障碍物层
   obstacle_layer:
      enabled: false 
      obstructed_range: 5
      raytrace_range: 5.5
      max_obstacle_height: 2.0
      unknown_threshold: 15
      mark_threshold: 0 
      combination_method: 1
      track_unknown_space: true
      # origin_z: 0.0
      # z_resolution: 0.2
      # z_voxels: 2
      publish_voxel_map: false
      observation_sources: scan
      scan: 
         data_type: LaserScan
         sensor_frame: laser_link
         topic: scan_filtered
         marking: true
         clearing: true
         min_obstacle_height: 0.0
         max_obstacle_height: 1.0
         inf_is_valid: true

  #膨胀层
   inflation_layer:
      enabled:              false
      cost_scaling_factor:  8.0  # 由于在公式中cost_scaling_factor被乘了一个负数，所以增大比例因子反而会降低代价
      inflation_radius:     0.35   # 代价膨胀半径

   plugins:
      - {name: static_layer,            type: "costmap_2d::StaticLayer"}
      # - {name: obstacle_layer,      type: "costmap_2d::ObstacleLayer"}
      # - {name: inflation_layer,     type: "costmap_2d::InflationLayer"}
